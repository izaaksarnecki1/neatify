source: "~/Downloads"
dest: "~/Organized"
dry_run: true
verbose: true
check_duplicates: true
categories:
  images: ["*.jpg", "*.jpeg", "*.png", "*.gif"]
  documents: ["*.pdf", "*.docx", "*.txt"]
  code: ["*.java", "*.py", "*.cpp", "*.c", "*.rs", "*.go"]
  videos: ["*.mp4", "*.mov"]
  archives: ["*.tar.gz", "*.zip", "*.rar"]
  uncategorized: []
ignore:
  names: [".git", "node_modules", "__pycache__", ".venv", "venv", ".idea", ".vscode"]
  patterns: ["*.pyc", "*.log", ".DS_Store", "Thumbs.db"]

